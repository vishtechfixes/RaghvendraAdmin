  .sub{font-size:13px;color:#64748b;margin-bottom:20px}

  .item-row:last-child{border-bottom:none}
  .item-name{color:#e2e8f0;display:flex;align-items:center;gap:6px}
  .item-price{color:#FFD700;font-weight:700;font-size:12px}

  .inp:focus{border-color:#FFD700}
  .btn{width:100%;padding:14px;background:linear-gradient(135deg,#8B0000,#5B0000);border:2px solid #FFD700;color:#FFD700;font-size:15px;font-weight:800;border-radius:10px;cursor:pointer;margin-bottom:12px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .err{color:#ef4444;background:rgba(239,68,68,.1);border-radius:8px;padding:10px 12px;font-size:13px;margin-top:8px;display:none}
  .ok{color:#22c55e;background:rgba(34,197,94,.1);border-radius:8px;padding:10px 12px;font-size:13px;margin-top:8px;display:none}
  .log{background:#0d0000;border:1px solid #4a1010;border-radius:10px;padding:14px;font-size:12px;font-family:monospace;max-height:300px;overflow-y:auto;margin-top:12px;display:none}
  .l-ok{color:#22c55e;margin-bottom:2px}
  .l-err{color:#ef4444;margin-bottom:2px}
  .l-inf{color:#94a3b8;margin-bottom:2px}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
  .stat{background:#2a0505;border:1px solid #4a1010;border-radius:8px;padding:12px;text-align:center}
  .stat-n{font-size:24px;font-weight:800;color:#FFD700}
  .stat-l{font-size:11px;color:#64748b}
  #seed-section{display:none}
  .done{background:#052e16;border:1px solid #16a34a;border-radius:12px;padding:16px;text-align:center;display:none;margin-top:12px}
  .done h2{color:#22c55e;margin-bottom:6px}

  .user-info{display:none;background:#052e16;border:1px solid #16a34a;border-radius:8px;padding:10px 14px;font-size:13px;color:#86efac;margin-bottom:16px}
  .progress-bar{width:100%;height:8px;background:#2a0505;border-radius:99px;margin-bottom:16px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,#FFD700,#FFA500);border-radius:99px;transition:width .3s;width:0%}

  cats[item.cat].push(item);
});
document.getElementById('cat-n').textContent = Object.keys(cats).length;

function renderPreview() {
  const prev = document.getElementById('preview');
  prev.innerHTML = '';
  Object.entries(cats).forEach(([cat, items]) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h3>${CAT_ICONS[cat]||'🍽️'} ${cat} — ${items.length} items</h3>` +
      items.map(it =>
        `<div class="item-row">
          <span class="item-name">${it.emoji} ${it.name}</span>
          <span class="item-price">Rs.${it.price}</span>
        </div>`).join('');
    prev.appendChild(card);
  });
}

function log(msg, type='inf') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  const d = document.createElement('div');
  d.className = `l-${type}`; d.textContent = msg;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}

window.doLogin = async function() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value.trim();
  const errEl = document.getElementById('login-err');
  const okEl  = document.getElementById('login-ok');
  errEl.style.display='none'; okEl.style.display='none';
  if (!email || !pass) { errEl.textContent='Email aur password daalo!'; errEl.style.display='block'; return; }
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    okEl.textContent = `Logged in: ${cred.user.email}`;
    okEl.style.display = 'block';
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('seed-section').style.display  = 'block';
    const info = document.getElementById('user-info');
    info.textContent = `Admin: ${cred.user.email}`;
    info.style.display = 'block';
    renderPreview();
  } catch(e) {
    let msg = 'Login fail hua.';
    if (e.code==='auth/wrong-password'||e.code==='auth/invalid-credential') msg='Email ya password galat hai!';
    errEl.textContent = msg; errEl.style.display = 'block';
  }
};

window.startSeed = async function() {
  const btn = document.getElementById('seed-btn');
  btn.disabled = true; btn.textContent = 'Adding...';
  const total = MENU.length;
  try {
    log('Purana menu clear kar raha hoon...','inf');
    const snap = await getDocs(collection(db,'menu'));
    for (const d of snap.docs) await deleteDoc(d.ref);
    log(`${snap.size} purane items delete kiye`,'inf');

    let done = 0;
    for (const item of MENU) {
      const id = item.name.toLowerCase()
        .replace(/[^a-z0-9\u0900-\u097F]+/g,'-')
        .replace(/(^-|-$)/g,'')
        .substring(0,60);

      await setDoc(doc(db,'menu',id), {
        name:         item.name,
        category:     item.cat,
        emoji:        item.emoji,
        price:        item.price,
        veg:          true,
        available:    true,
        isBestSeller: false,
        showOnApp:    true,
        addedAt:      new Date().toISOString(),
      });
      done++;
      document.getElementById('done-count').textContent = done;
      document.getElementById('progress').style.width = `${(done/total*100).toFixed(1)}%`;
      log(`${item.emoji} ${item.name} — Rs.${item.price}`,'ok');
    }
    log(`\n🎉 Done! ${done} items added!`,'ok');
    document.getElementById('done-banner').style.display = 'block';
    btn.textContent = '✅ Done!';
  } catch(e) {
    log(`Error: ${e.message}`,'err');
    btn.disabled = false; btn.textContent = '🔄 Dobara Try Karo';
  }
};
</script>
